<!DOCTYPE html>
<html>
<head>
<title>News Database</title>
</head>

<body>

<h1>News Articles</h1>

<table border="1">

<tr>
<th>ID</th>
<th>outlet</th>
<th>bias</th>
<th>country</th>
<th>title</th>
<th>url</th>
<th>summary</th>
<th>published</th>
<th>fetched_at</th>
</tr>

{% for row in rows %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
<td>{{ row[6] }}</td>
<td>{{ row[7] }}</td>
<td>{{ row[8] }}</td>
<td>{{ row[9] }}</td>
<td>{{ row[10] }}</td>
<td>{{ row[11] }}</td>
<td>{{ row[12] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
